<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil de Imprensa · FSB</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #F7F8FA;
    color: #1a1a2e;
    height: 100vh;
    overflow: hidden;
  }

  /* LOGIN */
  #login-screen {
    position: fixed; inset: 0;
    background: #0d1b2a;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .login-box {
    background: #fff;
    border-radius: 16px;
    padding: 40px 48px;
    width: 340px;
    text-align: center;
  }
  .login-logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #0d1b2a;
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
  }
  .login-box input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
    letter-spacing: 0.1em;
  }
  .login-box input:focus { border-color: #0d1b2a; }
  .login-box button {
    width: 100%;
    padding: 12px;
    background: #0d1b2a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-box button:hover { background: #1a3550; }
  .login-error {
    font-size: 12px;
    color: #c0392b;
    margin-top: 10px;
    display: none;
  }

  /* APP */
  #app { display: none; height: 100vh; flex-direction: column; }

  /* TOPBAR */
  .topbar {
    display: flex; align-items: center;
    padding: 0 16px;
    height: 48px;
    background: #0d1b2a;
    gap: 12px;
    flex-shrink: 0;
  }
  .topbar-brand {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #fff;
  }
  .topbar-divider { width: 1px; height: 18px; background: rgba(255,255,255,0.2); }
  .topbar-title { font-size: 13px; color: rgba(255,255,255,0.6); }
  .topbar-right { margin-left: auto; }
  .topbar-count { font-size: 12px; color: rgba(255,255,255,0.5); }

  /* MAIN LAYOUT — desktop */
  .main-layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* LEFT PANEL */
  .left-panel {
    background: #fff;
    border-right: 1px solid #eaecf0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .map-container {
    padding: 14px 16px 8px;
    border-bottom: 1px solid #eaecf0;
    flex-shrink: 0;
  }
  .panel-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 8px;
  }
  #brazil-map {
    width: 100%;
    height: auto;
    cursor: pointer;
    display: block;
  }
  #brazil-map path {
    fill: #E8EEF4;
    stroke: #fff;
    stroke-width: 0.8;
    transition: fill 0.15s;
  }
  #brazil-map path:hover { fill: #b8cfe8; }
  #brazil-map path.selected { fill: #0d1b2a; }

  .filters-area {
    padding: 12px 16px;
    border-bottom: 1px solid #eaecf0;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .filters-area input,
  .filters-area select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    font-size: 13px;
    color: #1a1a2e;
    background: #F7F8FA;
    outline: none;
    transition: border-color 0.2s;
  }
  .filters-area input:focus,
  .filters-area select:focus { border-color: #0d1b2a; background: #fff; }

  .filter-row { display: flex; gap: 8px; }
  .filter-row select { flex: 1; }

  .clear-btn {
    font-size: 12px;
    color: #888;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    padding: 0;
    text-decoration: underline;
    display: none;
  }
  .clear-btn:hover { color: #0d1b2a; }

  .export-area { padding: 12px 16px; flex-shrink: 0; }
  .export-btn {
    width: 100%;
    padding: 9px;
    border: 1.5px solid #0d1b2a;
    background: transparent;
    color: #0d1b2a;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .export-btn:hover { background: #0d1b2a; color: #fff; }

  /* RIGHT PANEL */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #F7F8FA;
  }

  .right-header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid #eaecf0;
    background: #fff;
    flex-shrink: 0;
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .state-title {
    font-size: 17px;
    font-weight: 600;
    color: #0d1b2a;
  }
  .state-uf {
    font-size: 12px;
    font-weight: 600;
    background: #0d1b2a;
    color: #fff;
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 0.06em;
  }
  .result-count {
    font-size: 13px;
    color: #888;
    margin-left: auto;
  }

  .cards-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .vcard {
    background: #fff;
    border: 1px solid #eaecf0;
    border-radius: 12px;
    padding: 14px 16px;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .vcard:hover {
    border-color: #b8cfe8;
    box-shadow: 0 2px 8px rgba(13,27,42,0.06);
  }
  .vcard-name {
    font-size: 14px;
    font-weight: 600;
    color: #0d1b2a;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .vcard-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }
  .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 100px;
  }
  .tag-TV       { background: #EDE9FE; color: #4C1D95; }
  .tag-Radio    { background: #FEF3C7; color: #78350F; }
  .tag-Impresso { background: #D1FAE5; color: #064E3B; }
  .tag-Digital  { background: #DBEAFE; color: #1E3A8A; }
  .tag-Agencia  { background: #FCE7F3; color: #831843; }
  .tag-abr      { background: #F3F4F6; color: #6B7280; }

  .vcard-meta {
    font-size: 12px;
    color: #6B7280;
    line-height: 1.6;
  }
  .vcard-meta span { display: block; }
  .vcard-obs {
    font-size: 11px;
    color: #aaa;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #f0f0f0;
    line-height: 1.4;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #aaa;
  }
  .empty-state p { font-size: 14px; margin-top: 8px; }
  .loading { text-align: center; padding: 60px; color: #aaa; font-size: 14px; }

  /* MOBILE */
  @media (max-width: 768px) {
    body { height: auto; overflow: auto; }

    #app { height: auto; overflow: auto; }

    .main-layout {
      grid-template-columns: 1fr;
      overflow: visible;
    }

    .left-panel {
      border-right: none;
      border-bottom: 1px solid #eaecf0;
      overflow: visible;
    }

    #brazil-map { height: 260px; }

    .right-panel {
      overflow: visible;
      min-height: 60vh;
    }

    .cards-scroll {
      overflow: visible;
      padding: 12px;
    }

    .cards-grid {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .right-header {
      padding: 12px 14px;
    }

    .result-count { margin-left: 0; width: 100%; }

    .topbar-title { display: none; }

    .login-box { width: 90%; padding: 32px 24px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">FSB Comunicação</div>
    <div class="login-sub">Perfil de Imprensa Estadual</div>
    <input type="password" id="pwd-input" placeholder="senha de acesso" />
    <button onclick="checkLogin()">Entrar</button>
    <div class="login-error" id="login-error">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <span class="topbar-brand">FSB</span>
    <div class="topbar-divider"></div>
    <span class="topbar-title">Perfil de Imprensa Estadual</span>
    <div class="topbar-right">
      <span class="topbar-count" id="total-count"></span>
    </div>
  </div>

  <div class="main-layout">
    <div class="left-panel">
      <div class="map-container">
        <div class="panel-label">Estados</div>
        <svg id="brazil-map" viewBox="0 0 500 520"></svg>
      </div>

      <div class="filters-area">
        <div class="panel-label" style="margin-bottom:2px;">Filtros</div>
        <input type="text" id="search-input" placeholder="Buscar veículo..." oninput="applyFilters()" />
        <div class="filter-row">
          <select id="seg-filter" onchange="applyFilters()">
            <option value="">Todos os segmentos</option>
            <option>TV</option>
            <option>Rádio</option>
            <option>Impresso</option>
            <option>Digital</option>
            <option>Agência</option>
          </select>
          <select id="abr-filter" onchange="applyFilters()">
            <option value="">Toda abrangência</option>
            <option>Estadual</option>
            <option>Regional</option>
            <option>Municipal</option>
          </select>
        </div>
        <button class="clear-btn" id="clear-btn" onclick="clearFilters()">Limpar filtros</button>
      </div>

      <div class="export-area">
        <button class="export-btn" onclick="exportCSV()">
          ↓ Exportar lista filtrada (.csv)
        </button>
      </div>
    </div>

    <div class="right-panel">
      <div class="right-header">
        <span class="state-title" id="state-title">Todos os estados</span>
        <span class="result-count" id="result-count"></span>
      </div>
      <div class="cards-scroll">
        <div id="cards-container" class="cards-grid">
          <div class="loading">Carregando dados...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpFQjCDL6yFjjDhtr3RF6TmQDNUHWPsCsZYia9VAvWft_9O3rmSGrHfJ_R8z3BE4sV91_yMtdn5c0v/pub?gid=281601474&single=true&output=csv';
const PASSWORD = 'FSB2026';
const GEOJSON_URL = 'https://cdn.jsdelivr.net/gh/codeforgermany/click_that_hood@main/public/data/brazil-states.geojson';

let allData = [];
let selectedUF = null;

function checkLogin() {
  const val = document.getElementById('pwd-input').value;
  if (val === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkLogin();
});

function initApp() {
  loadMap();
  loadData();
}

function loadData() {
  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      allData = results.data;
      document.getElementById('total-count').textContent = allData.length + ' veículos';
      applyFilters();
    },
    error: function() {
      document.getElementById('cards-container').innerHTML = '<div class="empty-state"><p>Erro ao carregar dados. Verifique a URL do Google Sheets.</p></div>';
    }
  });
}

function loadMap() {
  fetch(GEOJSON_URL)
    .then(r => r.json())
    .then(geo => renderMap(geo));
}

function renderMap(geo) {
  const VB_W = 500, VB_H = 520;

  const svg = d3.select('#brazil-map');
  const projection = d3.geoMercator().fitSize([VB_W, VB_H], geo);
  const path = d3.geoPath().projection(projection);

  svg.selectAll('path')
    .data(geo.features)
    .enter().append('path')
    .attr('d', path)
    .attr('data-uf', d => d.properties.sigla || '')
    .on('click', function(event, d) {
      const uf = d.properties.sigla || '';
      const name = d.properties.name || uf;
      if (selectedUF === uf) {
        selectedUF = null;
        svg.selectAll('path').classed('selected', false);
        document.getElementById('state-title').textContent = 'Todos os estados';
      } else {
        selectedUF = uf;
        svg.selectAll('path').classed('selected', false);
        d3.select(this).classed('selected', true);
        document.getElementById('state-title').textContent = name;
      }
      applyFilters();

      // no mobile, rola para os cards
      if (window.innerWidth <= 768) {
        document.querySelector('.right-panel').scrollIntoView({ behavior: 'smooth' });
      }
    })
    .append('title')
    .text(d => d.properties.name || '');
}

function applyFilters() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const seg = document.getElementById('seg-filter').value;
  const abr = document.getElementById('abr-filter').value;

  const hasFilter = search || seg || abr || selectedUF;
  document.getElementById('clear-btn').style.display = hasFilter ? 'block' : 'none';

  let filtered = allData.filter(row => {
    const nome = (row.Nome || '').toLowerCase();
    const matchSearch = !search || nome.includes(search);
    const matchSeg = !seg || row.Segmento === seg;
    const matchAbr = !abr || row.Abrangencia === abr;
    const matchUF = !selectedUF || row.UF === selectedUF;
    return matchSearch && matchSeg && matchAbr && matchUF;
  });

  renderCards(filtered);
  document.getElementById('result-count').textContent = filtered.length + ' veículo' + (filtered.length !== 1 ? 's' : '');
}

function clearFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('seg-filter').value = '';
  document.getElementById('abr-filter').value = '';
  selectedUF = null;
  d3.selectAll('#brazil-map path').classed('selected', false);
  document.getElementById('state-title').textContent = 'Todos os estados';
  applyFilters();
}

function renderCards(data) {
  const container = document.getElementById('cards-container');
  if (!data.length) {
    container.innerHTML = '<div class="empty-state"><p>Nenhum veículo encontrado com esses filtros.</p></div>';
    return;
  }

  const segClass = s => 'tag tag-' + (s || '').replace(/[^a-zA-Z]/g, '');

  container.innerHTML = data.map(row => `
    <div class="vcard">
      <div class="vcard-name">${row.Nome || '—'}</div>
      <div class="vcard-tags">
        ${row.Segmento ? `<span class="${segClass(row.Segmento)}">${row.Segmento}</span>` : ''}
        ${row.Abrangencia ? `<span class="tag tag-abr">${row.Abrangencia}</span>` : ''}
        ${row.UF ? `<span class="tag tag-abr">${row.UF}</span>` : ''}
      </div>
      <div class="vcard-meta">
        ${row.Tiragem_Audiencia ? `<span>📊 ${row.Tiragem_Audiencia}</span>` : ''}
        ${row.Linha_Editorial ? `<span>✏️ ${row.Linha_Editorial}</span>` : ''}
      </div>
      ${row.Observacoes ? `<div class="vcard-obs">${row.Observacoes}</div>` : ''}
    </div>
  `).join('');
}

function exportCSV() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const seg = document.getElementById('seg-filter').value;
  const abr = document.getElementById('abr-filter').value;

  let filtered = allData.filter(row => {
    const nome = (row.Nome || '').toLowerCase();
    return (!search || nome.includes(search))
      && (!seg || row.Segmento === seg)
      && (!abr || row.Abrangencia === abr)
      && (!selectedUF || row.UF === selectedUF);
  });

  const headers = ['Nome', 'UF', 'Segmento', 'Abrangencia', 'Tiragem_Audiencia', 'Linha_Editorial', 'Observacoes'];
  const rows = filtered.map(r => headers.map(h => `"${(r[h] || '').replace(/"/g, '""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'imprensa_filtrada.csv'; a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
