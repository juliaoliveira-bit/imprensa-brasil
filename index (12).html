<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil da Imprensa · FSB</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #EFF1EC; color: #1a1a1a; height: 100vh; overflow: hidden; }

  :root {
    --green-dark:  #1B3829;
    --green-mid:   #2D5A3D;
    --green-btn:   #3A7A52;
    --green-light: #4E9E6B;
    --green-map:   #5C9E72;
    --green-map-h: #3A7A52;
    --bg:          #EFF1EC;
    --card-bg:     #FFFFFF;
    --border:      #D8DDD4;
    --muted:       #6B7A6E;
  }

  /* ── LOGIN ── */
  #login-screen {
    position: fixed; inset: 0;
    background: var(--green-dark);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
  }
  .login-box {
    background: #fff; border-radius: 20px;
    padding: 48px 52px; width: 100%; max-width: 380px; text-align: center;
  }
  .login-subtitle { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green-mid); margin-bottom: 32px; line-height: 1.4; }
  .login-box input { width: 100%; padding: 14px 16px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; outline: none; color: #555; margin-bottom: 14px; transition: border-color 0.2s; }
  .login-box input::placeholder { color: #bbb; }
  .login-box input:focus { border-color: var(--green-mid); }
  .login-box button { width: 100%; padding: 13px; background: var(--green-dark); color: #fff; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .login-box button:hover { background: var(--green-mid); }
  .login-error { font-size: 12px; color: #c0392b; margin-top: 10px; display: none; }

  /* ── APP ── */
  #app { display: none; height: 100vh; flex-direction: column; }

  /* ── TOPBAR ── */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; background: var(--green-dark); flex-shrink: 0; }
  .topbar-title { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.7); }

  /* ── DESKTOP LAYOUT ── */
  .main-layout { display: grid; grid-template-columns: 340px 1fr; flex: 1; overflow: hidden; }

  /* ── LEFT PANEL (desktop) ── */
  .left-panel { background: #fff; border-right: 1px solid #D8DDD4; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }
  .map-wrapper { background: #F5F7F3; border-radius: 12px; padding: 10px; margin-bottom: 20px; flex-shrink: 0; }
  #brazil-map { width: 100%; height: auto; cursor: pointer; display: block; }
  #brazil-map path { fill: var(--green-map); stroke: #fff; stroke-width: 1.2; transition: fill 0.15s; }
  #brazil-map path:hover { fill: var(--green-map-h); }
  #brazil-map path.selected { fill: var(--green-dark); stroke: #fff; stroke-width: 1.5; }

  .filters-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #888; margin-bottom: 10px; }
  .filter-input, .filter-select {
    width: 100%; padding: 10px 12px;
    background: #F5F7F3; border: 1px solid #D8DDD4;
    border-radius: 8px; color: #1a1a1a; font-size: 12px; font-weight: 500;
    letter-spacing: 0.02em; outline: none;
    margin-bottom: 8px; -webkit-appearance: none; appearance: none; transition: border-color 0.2s;
  }
  .filter-input::placeholder { color: #aaa; }
  .filter-input:focus, .filter-select:focus { border-color: var(--green-mid); background: #fff; }
  .filter-select option { background: #fff; color: #1a1a1a; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .filter-row .filter-select { flex: 1; margin-bottom: 0; }
  .clear-link { display: none; font-size: 12px; color: #888; background: none; border: none; cursor: pointer; text-decoration: underline; padding: 2px 0; }
  .clear-link:hover { color: var(--green-dark); }
  .export-btn { width: 100%; margin-top: 12px; padding: 11px; background: transparent; border: 1.5px solid var(--green-dark); border-radius: 10px; color: var(--green-dark); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  .export-btn:hover { background: var(--green-dark); color: #fff; }

  /* ── RIGHT PANEL ── */
  .right-panel { display: flex; flex-direction: column; overflow: hidden; background: #E8EDE5; }

  .state-header { padding: 24px 28px 18px; background: #E8EDE5; flex-shrink: 0; }
  .state-name { font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: var(--green-dark); margin-bottom: 12px; }
  .state-intro-text { font-size: 13px; color: #3D4A3F; line-height: 1.75; max-height: 90px; overflow: hidden; position: relative; transition: max-height 0.35s ease; }
  .state-intro-text.expanded { max-height: 800px; }
  .state-intro-text.has-more:not(.expanded)::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 32px; background: linear-gradient(transparent, #E8EDE5); }
  .veja-mais { display: none; margin-top: 6px; font-size: 12px; font-weight: 600; color: var(--green-mid); background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; }

  .cards-scroll { flex: 1; overflow-y: auto; padding: 0 28px 28px; background: #E8EDE5; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }

  /* ── CARD ── */
  .vcard { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 16px 16px 14px; position: relative; cursor: pointer; transition: box-shadow 0.18s, transform 0.12s; }
  .vcard:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.09); transform: translateY(-2px); }
  .vcard-name { font-size: 14px; font-weight: 700; color: var(--green-dark); margin-bottom: 8px; line-height: 1.3; padding-right: 20px; }
  .vcard-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 100px; letter-spacing: 0.03em; }
  .tag-TV       { background: var(--green-dark); color: #fff; }
  .tag-Radio    { background: #3A5C8A; color: #fff; }
  .tag-Impresso { background: var(--green-mid); color: #fff; }
  .tag-Digital  { background: #6B4E8A; color: #fff; }
  .tag-Agencia  { background: #8A4E3A; color: #fff; }
  .tag-abr      { background: #E8EBE5; color: #555; }
  .vcard-desc { font-size: 12px; color: var(--muted); line-height: 1.55; margin-bottom: 32px; }
  .vcard-plus { position: absolute; bottom: 12px; right: 12px; width: 30px; height: 30px; border-radius: 50%; background: var(--green-btn); color: #fff; font-size: 20px; line-height: 30px; text-align: center; font-weight: 300; transition: background 0.15s, transform 0.1s; }
  .vcard:hover .vcard-plus { background: var(--green-dark); transform: scale(1.1); }

  .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .loading { grid-column: 1/-1; text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; display: none; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: 18px; width: 100%; max-width: 680px; max-height: 88vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,0.25); }
  .modal-topbar { background: var(--green-dark); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .modal-topbar-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .modal-close { background: rgba(255,255,255,0.12); border: none; color: #fff; font-size: 15px; cursor: pointer; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-close:hover { background: rgba(255,255,255,0.2); }
  .modal-body { overflow-y: auto; flex: 1; padding: 24px; }
  .modal-vehicle-name { font-size: 22px; font-weight: 800; color: var(--green-dark); margin-bottom: 10px; }
  .modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .modal-site-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--green-dark); color: #fff; border-radius: 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; margin-bottom: 18px; transition: background 0.15s; }
  .modal-site-btn:hover { background: var(--green-mid); }
  .modal-desc { font-size: 14px; color: #3D4A3F; line-height: 1.85; white-space: pre-line; }
  .modal-prog-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green-mid); margin: 20px 0 10px; }
  .modal-prog-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .modal-prog-table tr { border-bottom: 1px solid #E8EDE5; }
  .modal-prog-table tr:last-child { border-bottom: none; }
  .modal-prog-table td { padding: 8px 10px; vertical-align: top; }
  .modal-prog-table td:first-child { white-space: nowrap; font-weight: 600; color: var(--green-dark); width: 80px; }
  .modal-prog-table td:last-child { color: #3D4A3F; }
  .modal-prog-table tr:nth-child(even) td { background: #F5F7F3; }
  .modal-prog-table tr:nth-child(even) td:first-child { border-radius: 6px 0 0 6px; }
  .modal-prog-table tr:nth-child(even) td:last-child { border-radius: 0 6px 6px 0; }

  /* ════════════════════════════════════════
     MOBILE — abaixo de 768px
  ════════════════════════════════════════ */
  @media (max-width: 768px) {
    body { overflow: auto; height: auto; }
    #app { height: auto; min-height: 100vh; overflow: visible; }

    /* Topbar */
    .topbar { padding: 0 16px; height: 48px; }
    .topbar-title { display: none; }

    /* Layout empilhado */
    .main-layout { display: flex; flex-direction: column; overflow: visible; }

    /* Left panel vira barra compacta no topo */
    .left-panel {
      padding: 12px 16px 14px;
      flex-direction: column;
      overflow: visible;
      background: #fff;
      border-right: none;
      border-bottom: 1px solid #D8DDD4;
    }

    /* Mapa menor e centralizado */
    .map-wrapper { padding: 8px; margin-bottom: 14px; max-width: 260px; margin-left: auto; margin-right: auto; }

    /* Filtros em linha */
    .filters-label { display: none; }
    .filter-input { margin-bottom: 8px; font-size: 13px; padding: 10px 12px; }
    .filter-row { gap: 6px; margin-bottom: 0; }
    .filter-row .filter-select { font-size: 12px; padding: 9px 8px; }
    .clear-link { margin-top: 6px; }
    .export-btn { margin-top: 10px; font-size: 12px; padding: 11px; }

    /* Right panel */
    .right-panel { overflow: visible; }
    .state-header { padding: 16px 16px 12px; }
    .state-name { font-size: 18px; }
    .state-intro-text { font-size: 13px; max-height: 80px; }

    .cards-scroll { overflow: visible; padding: 0 16px 24px; }
    .cards-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .vcard { padding: 14px 14px 12px; }
    .vcard-name { font-size: 13px; padding-right: 16px; }
    .vcard-desc { font-size: 12px; margin-bottom: 28px; }
    .vcard-plus { width: 26px; height: 26px; font-size: 18px; line-height: 26px; bottom: 10px; right: 10px; }

    /* Modal: gaveta de baixo */
    .modal-overlay { padding: 0; align-items: flex-end; }
    .modal { max-height: 90vh; border-radius: 20px 20px 0 0; max-width: 100%; }
    .modal-topbar { padding: 12px 16px; }
    .modal-body { padding: 18px 16px 32px; }
    .modal-vehicle-name { font-size: 18px; }
    .modal-desc { font-size: 13px; }

    /* Indicador de arraste no modal */
    .modal::before {
      content: '';
      display: block;
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
  }

  @media (max-width: 400px) {
    .cards-grid { grid-template-columns: 1fr; }
    .login-box { padding: 36px 28px; }
    .login-logo { font-size: 36px; }
  }

  .login-logo-img {
    height: 56px;
    width: auto;
    display: block;
    margin: 0 auto 20px;
  }
  .topbar-logo-img {
    height: 28px;
    width: auto;
    display: block;
    filter: brightness(0) invert(1);
  }
  .modal-logo-img {
    height: 24px;
    width: auto;
    display: block;
    margin-bottom: 2px;
    filter: brightness(0) invert(1);
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <img src="logo_fsb.png" alt="FSB Comunicação" class="login-logo-img" />
    <div class="login-subtitle">Perfil da Imprensa<br>Regional</div>
    <input type="password" id="pwd-input" placeholder="SENHA DE ACESSO" />
    <button onclick="checkLogin()">Entrar</button>
    <div class="login-error" id="login-error">Senha incorreta.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <img src="logo_fsb_negativo.png" alt="FSB Comunicação" class="topbar-logo-img" />
    <div class="topbar-title">Perfil da Imprensa</div>
  </div>

  <div class="main-layout">

    <!-- ESQUERDO -->
    <div class="left-panel">
      <div class="map-wrapper">
        <svg id="brazil-map" viewBox="0 0 500 520"></svg>
      </div>
      <div class="filters-label">Filtros</div>
      <input class="filter-input" type="text" id="search-input" placeholder="Buscar veículo" oninput="applyFilters()" />
      <div class="filter-row">
        <select class="filter-select" id="seg-filter" onchange="applyFilters()">
          <option value="">Todos os segmentos</option>
          <option>TV</option><option>Rádio</option>
          <option>Impresso</option><option>Digital</option><option>Agência</option>
        </select>
        <select class="filter-select" id="abr-filter" onchange="applyFilters()">
          <option value="">Toda abrangência</option>
          <option>Estadual</option><option>Regional</option><option>Municipal</option>
        </select>
      </div>
      <button class="clear-link" id="clear-btn" onclick="clearFilters()">Limpar filtros</button>
      <button class="export-btn" onclick="exportCSV()">↓ Exportar lista filtrada (.csv)</button>
    </div>

    <!-- DIREITO -->
    <div class="right-panel">
      <div class="state-header" id="state-header" style="display:none;">
        <div class="state-name" id="state-name"></div>
        <div class="state-intro-text" id="state-intro"></div>
        <button class="veja-mais" id="veja-mais" onclick="toggleIntro()">Veja mais</button>
      </div>
      <div class="cards-scroll">
        <div id="cards-container" class="cards-grid">
          <div class="loading">Carregando dados...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-topbar">
      <div>
        <img src="logo_fsb_negativo.png" alt="FSB Comunicação" class="modal-logo-img" />
        <div class="modal-topbar-label">Perfil da Imprensa</div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-vehicle-name" id="modal-name"></div>
      <div class="modal-tags" id="modal-tags"></div>
      <a class="modal-site-btn" id="modal-site" href="#" target="_blank">🔗 Acesse o site</a>
      <div class="modal-desc" id="modal-desc"></div>
      <div id="modal-prog-section"></div>
      <div class="modal-note" id="modal-note" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
const URL_VEICULOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0UNHZYOe2f1Go00lEVPIPIsut2lMwxfTHetLyi0j3JHXiCg2mcprXJB5me6lZPUxTP1IoQhPreWh2/pub?gid=1724809648&single=true&output=csv';
const URL_ESTADOS  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0UNHZYOe2f1Go00lEVPIPIsut2lMwxfTHetLyi0j3JHXiCg2mcprXJB5me6lZPUxTP1IoQhPreWh2/pub?gid=248067165&single=true&output=csv';
const PASSWORD     = 'FSB2026';
const GEOJSON_URL  = 'https://cdn.jsdelivr.net/gh/codeforgermany/click_that_hood@main/public/data/brazil-states.geojson';

let veiculos = [], estados = {}, selectedUF = null, introExpanded = false, currentFiltered = [];

// ── LOGIN ──────────────────────────────────────────────────────
function checkLogin() {
  if (document.getElementById('pwd-input').value === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkLogin(); });

function initApp() { loadMap(); loadVeiculos(); loadEstados(); }

// ── DADOS ──────────────────────────────────────────────────────
function loadVeiculos() {
  fetch(URL_VEICULOS)
    .then(r => r.text())
    .then(text => {
      const lines = text.split('\n');
      lines.shift(); // remove linha de título
      const result = Papa.parse(lines.join('\n'), { header: true, skipEmptyLines: true });
      veiculos = result.data;
      applyFilters();
    })
    .catch(() => {
      document.getElementById('cards-container').innerHTML =
        '<div class="empty-state">Erro ao carregar dados. Verifique a URL do Google Sheets.</div>';
    });
}
function loadEstados() {
  fetch(URL_ESTADOS)
    .then(r => r.text())
    .then(text => {
      const lines = text.split('\n');
      lines.shift(); // remove linha de título
      const result = Papa.parse(lines.join('\n'), { header: true, skipEmptyLines: true });
      result.data.forEach(row => { estados[row.UF] = row; });
    })
    .catch(() => console.warn('Erro ao carregar estados.'));
}

// ── MAPA ──────────────────────────────────────────────────────
function loadMap() {
  fetch(GEOJSON_URL).then(r => r.json()).then(renderMap);
}
function renderMap(geo) {
  const svg = d3.select('#brazil-map');
  const proj = d3.geoMercator().fitSize([500, 520], geo);
  const path = d3.geoPath().projection(proj);
  svg.selectAll('path')
    .data(geo.features).enter().append('path')
    .attr('d', path)
    .on('click', function(event, d) {
      const uf   = d.properties.sigla || '';
      const name = d.properties.name  || uf;
      if (selectedUF === uf) {
        selectedUF = null;
        svg.selectAll('path').classed('selected', false);
        hideStateHeader();
      } else {
        selectedUF = uf;
        svg.selectAll('path').classed('selected', false);
        d3.select(this).classed('selected', true);
        showStateHeader(uf, name);
        // Mobile: rola suavemente para os cards
        if (window.innerWidth <= 768) {
          setTimeout(() => {
            document.querySelector('.right-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 100);
        }
      }
      applyFilters();
    })
    .append('title').text(d => d.properties.name || '');
}

// ── HEADER DO ESTADO ──────────────────────────────────────────
function showStateHeader(uf, name) {
  const headerEl = document.getElementById('state-header');
  const nameEl   = document.getElementById('state-name');
  const introEl  = document.getElementById('state-intro');
  const toggleEl = document.getElementById('veja-mais');

  headerEl.style.display = 'block';
  nameEl.textContent = name.toUpperCase();
  introExpanded = false;
  introEl.classList.remove('expanded', 'has-more');

  const est   = estados[uf];
  const texto = est ? (est.Texto_Abertura || '') : '';

  if (texto) {
    introEl.textContent = texto;
    setTimeout(() => {
      const overflow = introEl.scrollHeight > 95;
      introEl.classList.toggle('has-more', overflow);
      toggleEl.style.display = overflow ? 'block' : 'none';
      toggleEl.textContent = 'Veja mais';
    }, 50);
  } else {
    introEl.textContent = '';
    toggleEl.style.display = 'none';
  }
}

function hideStateHeader() {
  document.getElementById('state-header').style.display = 'none';
}

function toggleIntro() {
  introExpanded = !introExpanded;
  document.getElementById('state-intro').classList.toggle('expanded', introExpanded);
  document.getElementById('veja-mais').textContent = introExpanded ? 'Veja menos' : 'Veja mais';
}

// ── FILTROS ───────────────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const seg    = document.getElementById('seg-filter').value;
  const abr    = document.getElementById('abr-filter').value;
  const hasFilter = search || seg || abr || selectedUF;
  document.getElementById('clear-btn').style.display = hasFilter ? 'block' : 'none';

  currentFiltered = veiculos.filter(v =>
    (!search || (v.Nome||'').toLowerCase().includes(search) || (v.Grupo||'').toLowerCase().includes(search)) &&
    (!seg    || v.Segmento   === seg) &&
    (!abr    || v.Abrangencia === abr) &&
    (!selectedUF || v.UF === selectedUF)
  );
  renderCards(currentFiltered);
}

function clearFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('seg-filter').value   = '';
  document.getElementById('abr-filter').value   = '';
  selectedUF = null;
  d3.selectAll('#brazil-map path').classed('selected', false);
  hideStateHeader();
  applyFilters();
}

// ── CARDS ─────────────────────────────────────────────────────
function renderCards(data) {
  const c = document.getElementById('cards-container');
  if (!data.length) {
    c.innerHTML = selectedUF
      ? '<div class="empty-state">Nenhum veículo cadastrado para este estado ainda.</div>'
      : '<div class="empty-state">Clique em um estado no mapa para ver os veículos.</div>';
    return;
  }
  const sc = s => 'tag tag-' + (s||'').replace(/[^a-zA-Z]/g,'');
  c.innerHTML = data.map((v, i) => `
    <div class="vcard" onclick="openModal(${i})">
      <div class="vcard-name">${v.Nome||'—'}</div>
      <div class="vcard-tags">
        ${v.Segmento    ? `<span class="${sc(v.Segmento)}">${v.Segmento}</span>` : ''}
        ${v.Abrangencia ? `<span class="tag tag-abr">${v.Abrangencia}</span>` : ''}
        ${v.UF          ? `<span class="tag tag-abr">${v.UF}</span>` : ''}
      </div>
      ${v.Resumo ? `<div class="vcard-desc">${v.Resumo.substring(0,110)}${v.Resumo.length>110?'…':''}</div>` : ''}
      <div class="vcard-plus">+</div>
    </div>
  `).join('');
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(idx) {
  const v = currentFiltered[idx];
  if (!v) return;
  const sc = s => 'tag tag-' + (s||'').replace(/[^a-zA-Z]/g,'');
  document.getElementById('modal-name').textContent = v.Nome || '';
  document.getElementById('modal-tags').innerHTML = [
    v.Segmento    ? `<span class="${sc(v.Segmento)}">${v.Segmento}</span>` : '',
    v.Abrangencia ? `<span class="tag tag-abr">${v.Abrangencia}</span>` : '',
    v.UF          ? `<span class="tag tag-abr">${v.UF}</span>` : '',
  ].join('');
  const siteEl = document.getElementById('modal-site');
  if (v.Site) {
    siteEl.href = v.Site.startsWith('http') ? v.Site : 'https://' + v.Site;
    siteEl.style.display = 'inline-flex';
  } else { siteEl.style.display = 'none'; }
  document.getElementById('modal-desc').textContent = v.Detalhes || v.Resumo || '';

  // Tabela de programação
  const progSection = document.getElementById('modal-prog-section');
  if (v.Programacao && v.Programacao.trim()) {
    const linhas = v.Programacao.trim().split('\n').filter(l => l.includes('|'));
    if (linhas.length) {
      const rows = linhas.map(l => {
        const [horario, ...resto] = l.split('|');
        return `<tr><td>${horario.trim()}</td><td>${resto.join('|').trim()}</td></tr>`;
      }).join('');
      progSection.innerHTML = `
        <div class="modal-prog-title">Programação</div>
        <table class="modal-prog-table">${rows}</table>
      `;
    } else {
      progSection.innerHTML = '';
    }
  } else {
    progSection.innerHTML = '';
  }
  const noteEl = document.getElementById('modal-note');
  if (v.Nota) { noteEl.textContent = v.Nota; noteEl.style.display = 'block'; }
  else { noteEl.style.display = 'none'; }
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// ── EXPORT ────────────────────────────────────────────────────
function exportCSV() {
  const headers = ['Nome','Grupo','UF','Segmento','Abrangencia','Publico','Site'];
  const rows = currentFiltered.map(r => headers.map(h => `"${(r[h]||'').replace(/"/g,'""')}"`).join(';'));
  const csv  = [headers.join(';'), ...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'imprensa_filtrada.csv'; a.click();
}
</script>
